<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="数学花园">
    <meta name="theme-color" content="#ff6b9d">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%23ff6b9d' width='180' height='180' rx='40'/%3E%3Ctext x='90' y='125' font-size='90' text-anchor='middle'%3E🌸%3C/text%3E%3C/svg%3E">
    <title>🌸 数学花园 - 快乐学算术</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 50%, #ffd4e8 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* iPad 特定修复 */
        @supports (-webkit-touch-callout: none) {
            body {
                min-height: -webkit-fill-available;
            }
        }

        /* 浮动装饰元素 */
        .floating-element {
            position: fixed;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
            opacity: 0.6;
            z-index: 0;
        }

        .floating-element:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; font-size: 2rem; }
        .floating-element:nth-child(2) { top: 20%; right: 8%; animation-delay: 1s; font-size: 1.5rem; }
        .floating-element:nth-child(3) { top: 60%; left: 3%; animation-delay: 2s; font-size: 1.8rem; }
        .floating-element:nth-child(4) { bottom: 20%; right: 5%; animation-delay: 3s; font-size: 2.2rem; }
        .floating-element:nth-child(5) { top: 40%; right: 15%; animation-delay: 4s; font-size: 1.3rem; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* 主容器 */
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* iPad 横屏优化 */
        @media (min-width: 768px) {
            .container {
                max-width: 600px;
                padding: 30px;
            }
            .title { font-size: 2.2rem; }
            .question { font-size: 4rem; }
            .numpad { gap: 15px; }
            .numpad-btn {
                padding: 25px;
                font-size: 2rem;
                min-height: 80px;
            }
            .btn {
                padding: 20px;
                font-size: 1.2rem;
            }
            .answer-input {
                padding: 25px;
                font-size: 2.5rem;
            }
        }

        /* iPad Pro 大屏优化 */
        @media (min-width: 1024px) {
            .container {
                max-width: 700px;
            }
            .question { font-size: 5rem; }
            .numpad-btn {
                padding: 30px;
                font-size: 2.2rem;
                min-height: 90px;
            }
        }

        /* 头部 */
        .header {
            text-align: center;
            padding: 20px 0;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }

        /* 等级卡片 */
        .level-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.15);
            text-align: center;
        }

        .level-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .progress-container {
            background: #f0f0f0;
            border-radius: 15px;
            height: 12px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d, #ff8fab);
            border-radius: 15px;
            transition: width 0.5s ease;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ff6b9d;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 3px;
        }

        /* 游戏区域 */
        .game-area {
            background: white;
            border-radius: 24px;
            padding: 25px;
            margin: 15px 0;
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.15);
        }

        .question-counter {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .question {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            color: #333;
            margin: 25px 0;
            letter-spacing: 5px;
        }

        .answer-input {
            width: 100%;
            padding: 20px;
            font-size: 2rem;
            text-align: center;
            border: 3px solid #ffe0f0;
            border-radius: 20px;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 700;
            color: #333;
        }

        .answer-input:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
        }

        .answer-input.correct {
            border-color: #4ade80;
            background: #f0fdf4;
            -webkit-animation: pulse-green 0.5s ease;
            animation: pulse-green 0.5s ease;
        }

        .answer-input.wrong {
            border-color: #f87171;
            background: #fef2f2;
            -webkit-animation: shake 0.5s ease;
            animation: shake 0.5s ease;
        }

        @keyframes pulse-green {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 数字键盘 */
        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .numpad-btn {
            background: linear-gradient(135deg, #fff5f8, #ffe8f0);
            border: none;
            border-radius: 18px;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff6b9d;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.1);
            min-height: 60px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .numpad-btn:active {
            transform: scale(0.92);
            box-shadow: 0 2px 8px rgba(255, 107, 157, 0.3);
            background: linear-gradient(135deg, #ffe8f0, #ffd4e8);
        }

        .numpad-btn:hover {
            background: linear-gradient(135deg, #ffe8f0, #ffd4e8);
        }

        .numpad-btn.action {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: white;
        }

        .numpad-btn.wide {
            grid-column: span 2;
        }

        /* 反馈消息 */
        .feedback {
            text-align: center;
            padding: 15px;
            margin: 15px 0;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .feedback.show {
            opacity: 1;
            transform: translateY(0);
        }

        .feedback.success {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
        }

        .feedback.error {
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: white;
        }

        /* 按钮 */
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 0;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d, #ff8fab);
            color: white;
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.4);
        }

        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 3px 10px rgba(255, 107, 157, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #ff6b9d;
            border: 2px solid #ff6b9d;
        }

        /* 结果页面 */
        .result-screen {
            display: none;
            text-align: center;
        }
        
        .result-screen.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-emoji {
            font-size: 5rem;
            margin: 20px 0;
        }

        .result-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #333;
            margin-bottom: 10px;
        }

        .result-stats {
            background: #fff5f8;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .result-stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #ffd4e8;
        }

        .result-stat:last-child {
            border-bottom: none;
        }

        /* 历史记录 */
        .history-section {
            margin-top: 20px;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #666;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #fff5f8;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .history-item.correct {
            border-left: 4px solid #4ade80;
        }

        .history-item.wrong {
            border-left: 4px solid #f87171;
        }

        /* 隐藏的游戏界面 */
        .game-screen {
            display: none;
        }

        .game-screen.active {
            display: block;
        }

        /* 开始界面 */
        .start-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .start-screen .logo {
            font-size: 6rem;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .start-screen h1 {
            font-size: 2rem;
            color: #ff6b9d;
            margin: 20px 0 10px;
        }

        .start-screen p {
            color: #888;
            margin-bottom: 30px;
        }

        /* 难度标签 */
        .difficulty-tag {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .difficulty-easy {
            background: #d4edda;
            color: #155724;
        }

        .difficulty-medium {
            background: #fff3cd;
            color: #856404;
        }

        .difficulty-hard {
            background: #f8d7da;
            color: #721c24;
        }

        /* 连续答对动画 */
        .streak {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 4rem;
            font-weight: 800;
            color: #ff6b9d;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 0 30px rgba(255, 107, 157, 0.5);
        }

        .streak.show {
            animation: streakPop 1s ease forwards;
        }

        @keyframes streakPop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); }
            50% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0; }
        }

        /* 响应式 */
        @media (max-width: 380px) {
            .title { font-size: 1.5rem; }
            .question { font-size: 2.5rem; }
            .numpad-btn { padding: 15px; font-size: 1.3rem; }
        }

        @media (min-width: 768px) {
            .container { max-width: 600px; }
            .numpad { gap: 15px; }
            .numpad-btn { padding: 25px; font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <!-- 浮动装饰 -->
    <div class="floating-element">🌸</div>
    <div class="floating-element">⭐</div>
    <div class="floating-element">🦋</div>
    <div class="floating-element">🌺</div>
    <div class="floating-element">✨</div>

    <div class="container">
        <!-- 用户名设置界面 -->
        <div class="start-screen" id="usernameScreen">
            <div class="logo">🌸</div>
            <h1>数学花园</h1>
            <p>给自己起个名字吧！</p>
            <div style="margin: 30px 0;">
                <input type="text" id="usernameInput" placeholder="输入你的名字" maxlength="10" style="width: 100%; padding: 18px; font-size: 1.2rem; text-align: center; border: 3px solid #ffe0f0; border-radius: 16px; outline: none; font-family: inherit;">
            </div>
            <button class="btn btn-primary" onclick="saveUsername()">开始冒险 🚀</button>
        </div>

        <!-- 开始界面 -->
        <div class="start-screen" id="startScreen" style="display: none;">
            <div class="logo">🌸</div>
            <h1>数学花园</h1>
            <p>快乐学算术，每天进步一点点</p>
            <div style="margin: 10px 0; font-size: 1.1rem; color: #ff6b9d; font-weight: 700;">
                👋 你好，<span id="displayUsername">小数学家</span>！
            </div>
            
            <!-- 等级选择区域 -->
            <div style="margin: 15px 0; padding: 20px; background: rgba(255,255,255,0.9); border-radius: 16px; text-align: left;">
                <div style="font-size: 0.9rem; color: #888; margin-bottom: 10px; text-align: center;">选择你的等级</div>
                <div id="recommendedLevelBadge" style="display: none; text-align: center; margin-bottom: 15px; padding: 10px; background: linear-gradient(135deg, #ffeef8, #ffe0f0); border-radius: 12px;">
                    <span style="color: #ff6b9d; font-weight: 700;">💡 推荐等级: <span id="recommendedLevelText"></span></span>
                    <button onclick="applyRecommendedLevel()" style="margin-left: 10px; padding: 5px 15px; background: #ff6b9d; color: white; border: none; border-radius: 15px; font-size: 0.8rem; cursor: pointer;">使用推荐</button>
                </div>
                <div id="levelSelector" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;">
                    <!-- 等级按钮由JS生成 -->
                </div>
                <div style="margin-top: 10px; text-align: center; font-size: 0.85rem; color: #666;">
                    当前选择: <span id="selectedLevelDisplay" style="font-weight: 700; color: #ff6b9d;">等级 1 - 初出茅庐</span>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                <button class="btn btn-primary" onclick="startGame(); enterFullscreen();" style="flex: 1; min-width: 140px;">开始游戏 🎮</button>
                <button class="btn btn-secondary" onclick="showStats()" style="flex: 1; min-width: 140px;">学习统计 📈</button>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px;">
                <button class="btn btn-secondary" onclick="showHistory()" style="flex: 1; min-width: 140px; opacity: 0.9;">查看记录 📋</button>
                <button class="btn btn-secondary" onclick="showSessionRecords()" style="flex: 1; min-width: 140px; opacity: 0.9;">学习明细 📊</button>
            </div>
            <button class="btn btn-secondary" onclick="enterFullscreen()" style="margin-top: 10px; opacity: 0.6; font-size: 0.9rem;">📱 全屏模式</button>
            <button class="btn btn-secondary" onclick="changeUsername()" style="margin-top: 10px; opacity: 0.5; font-size: 0.85rem;">🔄 更换用户</button>
            <div style="margin-top: 30px; padding: 15px; background: rgba(255,255,255,0.6); border-radius: 16px; font-size: 0.85rem; color: #888;">
                <div>💡 每5次答题自动分析学习情况</div>
                <div>🎯 根据表现推荐合适难度</div>
                <div>🏆 可自主选择或接受推荐等级</div>
                <div style="margin-top: 8px; color: #ff6b9d; font-weight: 600;">📲 点击"分享"→"添加到主屏幕"更方便</div>
            </div>
        </div>

        <!-- 游戏界面 -->
        <div class="game-screen" id="gameScreen">
            <div class="header">
                <div class="logo">🌸</div>
                <div class="title">数学花园</div>
                <div class="subtitle">快乐学算术</div>
            </div>

            <!-- 等级卡片 -->
            <div class="level-card">
                <div class="level-badge">
                    <span>🏆</span>
                    <span id="levelText">等级 1 - 初学者</span>
                </div>
                <div class="difficulty-tag" id="difficultyTag">简单</div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="correctCount">0</div>
                        <div class="stat-label">答对</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="streakCount">0</div>
                        <div class="stat-label">连对</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="accuracy">0%</div>
                        <div class="stat-label">正确率</div>
                    </div>
                </div>
            </div>

            <!-- 游戏区域 -->
            <div class="game-area">
                <div class="question-counter">
                    第 <span id="currentQuestion">1</span> / <span id="totalQuestions">20</span> 题
                </div>
                <div class="question" id="question">?</div>
                <input type="text" class="answer-input" id="answerInput" readonly placeholder="?">
                <div class="feedback" id="feedback"></div>

                <!-- 数字键盘 -->
                <div class="numpad">
                    <button class="numpad-btn" onclick="inputNumber('1')">1</button>
                    <button class="numpad-btn" onclick="inputNumber('2')">2</button>
                    <button class="numpad-btn" onclick="inputNumber('3')">3</button>
                    <button class="numpad-btn" onclick="inputNumber('4')">4</button>
                    <button class="numpad-btn" onclick="inputNumber('5')">5</button>
                    <button class="numpad-btn" onclick="inputNumber('6')">6</button>
                    <button class="numpad-btn" onclick="inputNumber('7')">7</button>
                    <button class="numpad-btn" onclick="inputNumber('8')">8</button>
                    <button class="numpad-btn" onclick="inputNumber('9')">9</button>
                    <button class="numpad-btn action" onclick="clearInput()">⌫</button>
                    <button class="numpad-btn" onclick="inputNumber('0')">0</button>
                    <button class="numpad-btn action" onclick="submitAnswer()">✓</button>
                </div>
            </div>

            <button class="btn btn-secondary" onclick="endGame()">结束游戏</button>
        </div>

        <!-- 结果界面 -->
        <div class="result-screen" id="resultScreen">
            <div class="result-emoji" id="resultEmoji">🎉</div>
            <div class="result-title" id="resultTitle">练习完成！</div>
            <div class="result-stats">
                <div class="result-stat">
                    <span>答对题目</span>
                    <span id="resultCorrect">0</span>
                </div>
                <div class="result-stat">
                    <span>答错题目</span>
                    <span id="resultWrong">0</span>
                </div>
                <div class="result-stat">
                    <span>正确率</span>
                    <span id="resultAccuracy">0%</span>
                </div>
                <div class="result-stat">
                    <span>最高连对</span>
                    <span id="resultStreak">0</span>
                </div>
                <div class="result-stat">
                    <span>总用时</span>
                    <span id="resultTime">0:00</span>
                </div>
            </div>
            <button class="btn btn-primary" onclick="startGame()">再玩一次 🔄</button>
            <button class="btn btn-secondary" onclick="showStart()">返回首页</button>
        </div>
    </div>

    <!-- 连对动画 -->
    <div class="streak" id="streakAnimation"></div>

    <script src="analytics.js"></script>
    <script>
        // 游戏状态
        let gameState = {
            level: 1,
            currentQuestion: 1,
            totalQuestions: 20,
            startTime: null,
            totalTime: 0,
            correct: 0,
            wrong: 0,
            streak: 0,
            maxStreak: 0,
            currentAnswer: 0,
            userAnswer: '',
            history: [],
            difficulty: 'easy'
        };

        // 等级配置 - 武侠风格命名，支持加减混合运算
        const levels = {

        // 注册 Service Worker

        // 全屏功能 - iPad兼容版

            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }
        
        // iPad 触摸事件修复

        // 更新开始界面等级显示
        function updateStartScreenLevel() {
            const levelNames = {
                1: '初出茅庐', 2: '江湖新秀', 3: '小有名气', 4: '武林高手',

        // 加载进度
        function loadProgress() {
            const saved = localStorage.getItem('mathGameProgress');
            if (saved) {
                const progress = JSON.parse(saved);
                gameState.level = progress.level || 1;
                gameState.history = progress.history || [];
            }

        // 保存进度
        function saveProgress() {
            const progress = {
                level: gameState.level,
                history: gameState.history.slice(-50), // 只保留最近50条

            };

        // 更新等级显示
        function updateLevelDisplay() {
            const level = levels[gameState.level];

        // 开始游戏
        function startGame() {
            gameState.currentQuestion = 1;
            gameState.correct = 0;
            gameState.wrong = 0;
            gameState.streak = 0;
            gameState.maxStreak = 0;
            gameState.userAnswer = '';

            gameState.totalTime = 0;

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');

            updateStats();
            generateQuestion();
            updateProgress();
        }

        // 生成题目 - 支持加减混合运算
        function generateQuestion() {
            const level = levels[gameState.level];
            const op = level.ops[Math.floor(Math.random() * level.ops.length)];
            
            let a, b, c, answer, questionText;
            
            if (op === '+-' || op === '++' || op === '--') {
                // 混合运算：a + b - c 或 a + b + c 或 a - b - c
                a = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                b = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                c = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                
                if (op === '+-') {
                    // a + b - c，确保结果为正
                    while (a + b - c < 0 || a + b - c > 100) {
                        a = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                        b = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                        c = Math.floor(Math.random() * (Math.min(a + b, level.max) - level.min + 1)) + level.min;
                    }
                    answer = a + b - c;
                    questionText = `${a} + ${b} - ${c}`;
                } else if (op === '++') {
                    // a + b + c，确保不超过100
                    while (a + b + c > 100) {
                        a = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                        b = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                        c = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                    }
                    answer = a + b + c;
                    questionText = `${a} + ${b} + ${c}`;
                } else if (op === '--') {
                    // a - b - c，确保结果为正
                    while (a - b - c < 0) {
                        a = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                        b = Math.floor(Math.random() * (a - level.min + 1)) + level.min;
                        c = Math.floor(Math.random() * (a - b - level.min + 1)) + level.min;
                    }
                    answer = a - b - c;
                    questionText = `${a} - ${b} - ${c}`;
                }
            } else if (op === '+') {
                a = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                b = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                // 确保和不超过100
                while (a + b > 100) {
                    a = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                    b = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                }
                answer = a + b;
                questionText = `${a} + ${b}`;
            } else {
                a = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
                b = Math.floor(Math.random() * (a - level.min + 1)) + level.min;
                answer = a - b;
                questionText = `${a} - ${b}`;
            }

            gameState.currentAnswer = answer;
            document.getElementById('question').textContent = `${questionText} = ?`;
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').className = 'answer-input';
            document.getElementById('feedback').classList.remove('show');
            document.getElementById('currentQuestion').textContent = gameState.currentQuestion;
        }

        // 输入数字
        function inputNumber(num) {
            if (gameState.userAnswer.length < 3) {
                gameState.userAnswer += num;
                document.getElementById('answerInput').value = gameState.userAnswer;
            }
        }

        // 清除输入
        function clearInput() {
            gameState.userAnswer = gameState.userAnswer.slice(0, -1);
            document.getElementById('answerInput').value = gameState.userAnswer;
        }

        // 提交答案
        function submitAnswer() {
            if (gameState.userAnswer === '') return;

            const userAns = parseInt(gameState.userAnswer);
            const isCorrect = userAns === gameState.currentAnswer;

            // 记录历史
            const questionText = document.getElementById('question').textContent.replace(' = ?', '');
            gameState.history.push({
                question: questionText,
                userAnswer: userAns,
                correctAnswer: gameState.currentAnswer,
                isCorrect: isCorrect,
                time: new Date().toISOString()
            });

            if (isCorrect) {
                gameState.correct++;
                gameState.streak++;
                if (gameState.streak > gameState.maxStreak) {
                    gameState.maxStreak = gameState.streak;
                }
                
                document.getElementById('answerInput').classList.add('correct');
                showFeedback('太棒了！答对了！🎉', 'success');
                
                // 连对动画
                if (gameState.streak >= 3) {
                    showStreak(gameState.streak);
                }
            } else {
                gameState.wrong++;
                gameState.streak = 0;
                document.getElementById('answerInput').classList.add('wrong');
                showFeedback(`答错了，正确答案是 ${gameState.currentAnswer} 😅`, 'error');
            }

            updateStats();
            saveProgress();

            // 延迟下一题
            setTimeout(() => {
                if (gameState.currentQuestion < gameState.totalQuestions) {
                    gameState.currentQuestion++;
                    gameState.userAnswer = '';
                    generateQuestion();
                    updateProgress();
                } else {
                    endGame();
                }
            }, 1500);
        }

        // 显示反馈
        function showFeedback(message, type) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = message;
            feedback.className = `feedback ${type} show`;
        }

        // 显示连对动画
        function showStreak(count) {
            const streak = document.getElementById('streakAnimation');
            streak.textContent = `${count} 连对！🔥`;
            streak.classList.add('show');
            setTimeout(() => streak.classList.remove('show'), 1000);
        }

        // 更新统计
        function updateStats() {
            document.getElementById('correctCount').textContent = gameState.correct;
            document.getElementById('streakCount').textContent = gameState.streak;
            const total = gameState.correct + gameState.wrong;
            const accuracy = total > 0 ? Math.round((gameState.correct / total) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
        }

        // 更新进度条
        function updateProgress() {
            const progress = ((gameState.currentQuestion - 1) / gameState.totalQuestions) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // 结束游戏
        function endGame() {
            const total = gameState.correct + gameState.wrong;
            const accuracy = total > 0 ? Math.round((gameState.correct / total) * 100) : 0;
            
            // 先计算总用时（秒）
            gameState.totalTime = Math.floor((Date.now() - gameState.startTime) / 1000);
            
            // 记录到分析系统
            if (window.analytics) {
                analytics.recordSession({
                    level: gameState.level,
                    correct: gameState.correct,
                    wrong: gameState.wrong,
                    maxStreak: gameState.maxStreak,
                    duration: gameState.totalTime,  // 总用时（秒）
                    problems: gameState.history.slice(-total)
                });
                analytics.setLevel(gameState.level);
            }
            
            // 刷新推荐等级显示
            checkAndShowRecommendedLevel();

            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');

            // 格式化时间显示
            const minutes = Math.floor(gameState.totalTime / 60);
            const seconds = gameState.totalTime % 60;
            const timeString = `${minutes}:${seconds.toString().padStart(2, '0')}`;

            document.getElementById('resultCorrect').textContent = gameState.correct;
            document.getElementById('resultWrong').textContent = gameState.wrong;
            document.getElementById('resultAccuracy').textContent = accuracy + '%';
            document.getElementById('resultStreak').textContent = gameState.maxStreak;
            document.getElementById('resultTime').textContent = timeString;

            // 根据表现选择表情和标题
            if (accuracy >= 90) {
                document.getElementById('resultEmoji').textContent = '🏆';
                document.getElementById('resultTitle').textContent = '太棒了！数学小天才！';
            } else if (accuracy >= 70) {
                document.getElementById('resultEmoji').textContent = '🌟';
                document.getElementById('resultTitle').textContent = '做得很好！继续加油！';
            } else if (accuracy >= 50) {
                document.getElementById('resultEmoji').textContent = '👍';
                document.getElementById('resultTitle').textContent = '还不错，再练习一下！';
            } else {
                document.getElementById('resultEmoji').textContent = '💪';
                document.getElementById('resultTitle').textContent = '别灰心，多多练习！';
            }
        }

        // 显示学习统计
        function showStats() {
            if (!window.analytics) {
                alert('统计功能加载中，请稍后再试');
                return;
            }
            
            const stats = analytics.getStats();
            const levelNames = {
                1: '初出茅庐', 2: '江湖新秀', 3: '小有名气', 4: '武林高手',
                5: '一代宗师', 6: '绝世奇才', 7: '独孤求败', 8: '数学至尊'
            };
            
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 1000;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            `;
            
            let weakAreasHtml = stats.weakAreas.length > 0 
                ? `<p>📚 需要加强：${stats.weakAreas.join('、')}</p>` 
                : '';
            let strengthsHtml = stats.strengths.length > 0 
                ? `<p>🌟 你的强项：${stats.strengths.join('、')}</p>` 
                : '';
            
            modal.innerHTML = `
                <div style="background: white; border-radius: 20px; padding: 25px; max-width: 400px; width: 100%;">
                    <h3 style="color: #ff6b9d; margin-bottom: 20px; text-align: center;">📊 学习统计</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                        <div style="text-align: center; padding: 15px; background: #fff5f8; border-radius: 12px;">
                            <div style="font-size: 1.5rem; font-weight: 800; color: #ff6b9d;">${stats.totalProblems}</div>
                            <div style="font-size: 0.8rem; color: #888;">总答题数</div>
                        </div>
                        <div style="text-align: center; padding: 15px; background: #fff5f8; border-radius: 12px;">
                            <div style="font-size: 1.5rem; font-weight: 800; color: #ff6b9d;">${(stats.accuracy * 100).toFixed(0)}%</div>
                            <div style="font-size: 0.8rem; color: #888;">总正确率</div>
                        </div>
                        <div style="text-align: center; padding: 15px; background: #fff5f8; border-radius: 12px;">
                            <div style="font-size: 1.5rem; font-weight: 800; color: #ff6b9d;">${stats.streakDays}</div>
                            <div style="font-size: 0.8rem; color: #888;">连续天数</div>
                        </div>
                        <div style="text-align: center; padding: 15px; background: #fff5f8; border-radius: 12px;">
                            <div style="font-size: 1.5rem; font-weight: 800; color: #ff6b9d;">${levelNames[stats.currentLevel]}</div>
                            <div style="font-size: 0.8rem; color: #888;">当前等级</div>
                        </div>
                    </div>
                    ${weakAreasHtml}
                    ${strengthsHtml}
                    <button onclick="this.closest('.modal').remove()" class="btn btn-primary" style="margin-top: 15px;">关闭</button>
                </div>
            `;
            modal.className = 'modal';
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
            document.body.appendChild(modal);
        }

        // 返回首页
        function showStart() {
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('startScreen').style.display = 'block';
        }

        // 显示历史
        function showHistory() {
            if (gameState.history.length === 0) {
                alert('还没有游戏记录，快开始玩吧！');
                return;
            }

            let html = '<div style="max-height: 400px; overflow-y: auto;">';
            html += '<h3 style="margin-bottom: 15px; color: #ff6b9d;">📊 最近记录</h3>';
            
            const recent = gameState.history.slice(-20).reverse();
            recent.forEach(h => {
                const emoji = h.isCorrect ? '✅' : '❌';
                const color = h.isCorrect ? '#4ade80' : '#f87171';
                html += `
                    <div style="padding: 10px; margin: 5px 0; background: #fff5f8; border-radius: 10px; border-left: 4px solid ${color};">
                        <span style="font-size: 1.2rem;">${emoji}</span>
                        <strong>${h.question}</strong> = ${h.userAnswer}
                        ${!h.isCorrect ? `<span style="color: #f87171;">(正确答案: ${h.correctAnswer})</span>` : ''}
                    </div>
                `;
            });
            
            html += '</div>';
            
            // 创建弹窗
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 1000;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            `;
            modal.innerHTML = `
                <div style="background: white; border-radius: 20px; padding: 20px; max-width: 400px; width: 100%; max-height: 80vh; overflow: hidden;">
                    ${html}
                    <button onclick="this.closest('.modal').remove()" class="btn btn-primary" style="margin-top: 15px;">关闭</button>
                </div>
            `;
            modal.className = 'modal';
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
            document.body.appendChild(modal);
        }

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('gameScreen').classList.contains('active')) return;
            
            if (e.key >= '0' && e.key <= '9') {
                inputNumber(e.key);
            } else if (e.key === 'Enter') {
                submitAnswer();
            } else if (e.key === 'Backspace') {
                clearInput();
            }
        });

        // 初始化
        init();
    </script>
</body>
</html>
